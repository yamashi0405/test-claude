<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喫煙計測</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main class="content">

      <!-- 今日タブ -->
      <section id="tab-today" class="tab-panel active">
        <p id="today-date" class="today-date"></p>
        <p class="section-label">今日の本数</p>
        <div class="count-display">
          <span id="today-count">0</span><span class="count-unit">本</span>
        </div>
        <div class="cost-display" id="today-cost">¥0</div>

        <button id="btn-smoke" class="btn-smoke">1本吸った</button>
        <button id="btn-undo" class="btn-undo">最後の1本を取り消す</button>

        <div class="time-log">
          <p class="log-label">今日の記録</p>
          <ul id="today-log" class="log-list"></ul>
        </div>
      </section>

      <!-- 記録タブ -->
      <section id="tab-history" class="tab-panel">
        <div class="cal-nav">
          <button id="cal-prev" class="cal-nav-btn">&#8249;</button>
          <span id="cal-month-label" class="cal-month-label"></span>
          <button id="cal-next" class="cal-nav-btn">&#8250;</button>
        </div>
        <div class="cal-dow-row">
          <span class="dow-sun">日</span>
          <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span>
          <span class="dow-sat">土</span>
        </div>
        <div id="cal-grid" class="cal-grid"></div>
        <div id="cal-summary" class="cal-summary"></div>
      </section>

      <!-- 設定タブ -->
      <section id="tab-settings" class="tab-panel">
        <p class="page-title">設定</p>
        <div class="settings-form">
          <div class="form-group">
            <label for="price-per-pack">1箱の値段</label>
            <div class="input-row">
              <input type="number" id="price-per-pack" min="1" max="9999" inputmode="numeric">
              <span class="unit-label">円</span>
            </div>
          </div>
          <div class="form-group">
            <label for="cigs-per-pack">1箱の本数</label>
            <div class="input-row">
              <input type="number" id="cigs-per-pack" min="1" max="100" inputmode="numeric">
              <span class="unit-label">本</span>
            </div>
          </div>
          <div class="per-cig-info">
            1本あたり <span id="per-cig-price">¥28.5</span>
          </div>
          <button id="btn-save-settings" class="btn-save">保存</button>
        </div>
      </section>

    </main>

    <!-- 下部タブナビ -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="today">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span class="tab-label">今日</span>
      </button>
      <button class="tab-btn" data-tab="history">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="tab-label">記録</span>
      </button>
      <button class="tab-btn" data-tab="settings">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="tab-label">設定</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
